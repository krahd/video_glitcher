name: Release Bundles

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos-aarch64
            native_dir: lib/video/library/macos-aarch64
            launcher: packaging/portable/run-macos.sh
            asset_name: video_glitcher-macos-aarch64.zip
          - os: ubuntu-22.04
            platform: linux-amd64
            native_dir: lib/video/library/linux-amd64
            launcher: packaging/portable/run-linux.sh
            asset_name: video_glitcher-linux-amd64.zip
          - os: windows-2022
            platform: windows-amd64
            native_dir: lib/video/library/windows-amd64
            launcher: packaging/portable/run-windows.bat
            asset_name: video_glitcher-windows-amd64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Build app (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          javac -cp "lib/core.jar:lib/controlP5/library/*:lib/processing-opengl/library/*:lib/video/library/*" \
            -d bin src/tom/videoGlitcher/VideoGlitcher.java src/tom/videoGlitcher/VideoGlitcherLogic.java src/tom/videoGlitcher/FfmpegVideoExporter.java

      - name: Build app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          javac -cp "lib\core.jar;lib\controlP5\library\*;lib\processing-opengl\library\*;lib\video\library\*" `
            -d bin src\tom\videoGlitcher\VideoGlitcher.java src\tom\videoGlitcher\VideoGlitcherLogic.java src\tom\videoGlitcher\FfmpegVideoExporter.java

      - name: Package release bundle (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          rm -rf dist/release "dist/${{ matrix.asset_name }}"
          mkdir -p dist/release/video_glitcher/lib dist/release/video_glitcher/video
          jar --create --file dist/release/video_glitcher/video_glitcher.jar -C bin .
          cp lib/core.jar dist/release/video_glitcher/lib/
          cp lib/controlP5/library/*.jar dist/release/video_glitcher/lib/
          cp lib/processing-opengl/library/*.jar dist/release/video_glitcher/lib/
          cp lib/video/library/*.jar dist/release/video_glitcher/lib/
          cp -R "${{ matrix.native_dir }}" dist/release/video_glitcher/video/
          cp "${{ matrix.launcher }}" dist/release/video_glitcher/
          chmod +x dist/release/video_glitcher/*.sh
          cd dist/release
          zip -r "../${{ matrix.asset_name }}" video_glitcher

      - name: Package release bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force dist/release, "dist/${{ matrix.asset_name }}" -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force dist/release/video_glitcher/lib | Out-Null
          New-Item -ItemType Directory -Force dist/release/video_glitcher/video | Out-Null
          jar --create --file dist/release/video_glitcher/video_glitcher.jar -C bin .
          Copy-Item lib/core.jar dist/release/video_glitcher/lib/
          Copy-Item lib/controlP5/library/*.jar dist/release/video_glitcher/lib/
          Copy-Item lib/processing-opengl/library/*.jar dist/release/video_glitcher/lib/
          Copy-Item lib/video/library/*.jar dist/release/video_glitcher/lib/
          Copy-Item -Recurse "${{ matrix.native_dir }}" dist/release/video_glitcher/video/
          Copy-Item "${{ matrix.launcher }}" dist/release/video_glitcher/
          Compress-Archive -Path dist/release/video_glitcher -DestinationPath "dist/${{ matrix.asset_name }}" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

      - name: Ensure GitHub release exists
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --generate-notes \
              --title "${GITHUB_REF_NAME}" || gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null
          fi

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" "dist/${{ matrix.asset_name }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
